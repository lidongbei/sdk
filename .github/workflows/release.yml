name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# Build matrix
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true   # one failing target won't block the release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: .exe

          # Linux x86_64 (zigbuild targeting GLIBC 2.17 for broad distro compat)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            ext: ""
            zigbuild: true
            zigbuild_target: x86_64-unknown-linux-gnu.2.17

          # Linux x86_64 musl (fully static, no GLIBC dependency — max compat)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            ext: ""
            zigbuild: true

          # Linux aarch64 (cross-compiled via zigbuild — handles C deps well)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            ext: ""
            zigbuild: true
            zigbuild_target: aarch64-unknown-linux-gnu.2.17

          # Linux aarch64 musl (fully static)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            ext: ""
            zigbuild: true

          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            ext: ""

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Install zigbuild for Linux targets (enables min-GLIBC targeting and cross-compilation)
      - name: Install cargo-zigbuild
        if: matrix.zigbuild == true
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (native)
        if: matrix.zigbuild != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (zigbuild)
        if: matrix.zigbuild == true
        run: cargo zigbuild --release --target ${{ matrix.zigbuild_target || matrix.target }}

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package (zip, Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $bin = "sdk${{ matrix.ext }}"
          $dir = "sdk-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory $dir
          Copy-Item "target/${{ matrix.target }}/release/$bin" "$dir/$bin"
          Copy-Item README.md "$dir/README.md" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$dir" -DestinationPath "$dir.zip"
          echo "ASSET=$dir.zip" >> $env:GITHUB_ENV

      - name: Package (tar.gz, Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          BIN="sdk${{ matrix.ext }}"
          DIR="sdk-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$DIR"
          cp "target/${{ matrix.target }}/release/$BIN" "$DIR/$BIN"
          cp README.md "$DIR/README.md" 2>/dev/null || true
          tar czf "$DIR.tar.gz" "$DIR"
          echo "ASSET=$DIR.tar.gz" >> "$GITHUB_ENV"

      # ── Upload artifact for the release job ───────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release and attach all binaries
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    if: always()   # run even if some build targets fail
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: "sdk ${{ github.ref_name || inputs.tag }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: artifacts/**/*
